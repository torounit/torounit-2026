name: WordPress Playground Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Blueprint
        id: blueprint
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const fs = require('fs');
            const blueprint = JSON.parse(fs.readFileSync('blueprint.json', 'utf8'));
            const installTheme = blueprint.steps.find(s => s.step === 'installTheme');
            if (installTheme) {
              installTheme.themeData.ref = `refs/pull/${context.issue.number}/head`;
            }
            return JSON.stringify(blueprint);

      - name: Post Playground Preview
        uses: WordPress/action-wp-playground-pr-preview@v2
        with:
          blueprint: ${{ steps.blueprint.outputs.result }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
