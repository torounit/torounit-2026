name: WordPress Playground Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Playground URL
        id: url
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BLUEPRINT=$(jq \
            --arg ref "refs/pull/${PR_NUMBER}/head" \
            '(.steps[] | select(.step == "installTheme") | .themeData.ref) = $ref' \
            blueprint.json)
          ENCODED=$(echo -n "$BLUEPRINT" | base64 | tr -d '\n')
          echo "playground_url=https://playground.wordpress.net/#${ENCODED}" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          PLAYGROUND_URL: ${{ steps.url.outputs.playground_url }}
        with:
          script: |
            const marker = '<!-- wp-playground-preview -->';
            const playgroundUrl = process.env.PLAYGROUND_URL;
            const body = `${marker}
            ## WordPress Playground Preview

            [Preview on WordPress Playground](${playgroundUrl})`;

            const repoContext = {
              owner: context.repo.owner,
              repo: context.repo.repo,
            };

            const { data: comments } = await github.rest.issues.listComments({
              ...repoContext,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                ...repoContext,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...repoContext,
                issue_number: context.issue.number,
                body,
              });
            }
